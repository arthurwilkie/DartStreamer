# coturn TURN server configuration for DartStreamer

# Network
listening-port=3478
tls-listening-port=5349

# Realm
realm=dartstreamer.com

# HMAC-based auth (use-auth-secret mode)
use-auth-secret
static-auth-secret=REPLACE_WITH_SECRET

# TLS certificates (Let's Encrypt)
cert=/etc/letsencrypt/live/dartstreamer.com/fullchain.pem
pkey=/etc/letsencrypt/live/dartstreamer.com/privkey.pem

# Relay port range
min-port=49152
max-port=65535

# Disable TLS 1.0 and 1.1
no-tlsv1
no-tlsv1_1

# Disable CLI
no-cli

# Logging
log-file=/var/log/coturn/turnserver.log
simple-log

# Fingerprint STUN messages
fingerprint

# Use long-term credentials for REST API
lt-cred-mech
